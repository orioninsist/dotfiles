# -*- conf -*-
# Foot 1.26.0 Orijinal Şablon Üzerinden Murat'ın Ayarları

[main]
font=JetBrainsMono Nerd Font:weight=medium:size=12
pad=12x12
# Yeni sürümde alpha [colors] altına taşındı, burada bırakırsak hata verir.

[scrollback]
# Scrollback ayarı artık bu başlık altında
lines=10000

[cursor]
style=beam
blink=yes
# Renk hatası almamak için cursor rengini şimdilik varsayılan bırakıyoruz.

#[colors-dark]
#alpha=0.8
#background=000000

###
[colors-dark]
# Catppuccin Mocha Palette
foreground=cdd6f4 # Text
background=1e1e2e # Base
regular0=45475a   # Surface 1
regular1=f38ba8   # Red
regular2=a6e3a1   # Green
regular3=f9e2af   # Yellow
regular4=89b4fa   # Blue
regular5=f5c2e7   # Pink
regular6=94e2d5   # Teal
regular7=bac2de   # Subtext 1

bright0=585b70    # Surface 2
bright1=f38ba8    # Red
bright2=a6e3a1    # Green
bright3=f9e2af    # Yellow
bright4=89b4fa    # Blue
bright5=f5c2e7    # Pink
bright6=94e2d5    # Teal
bright7=a6adc8    # Subtext 0


###



[url]
launch=xdg-open ${url}

[mouse]
hide-when-typing=yes

[tweak]
# Monospace uyarısını kapat (Intel i5 sisteminde temiz görünüm için)
font-monospace-warn=no
